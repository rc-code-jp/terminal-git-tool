name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (vX.Y.Z)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  resolve_ref:
    name: resolve release tag
    runs-on: ubuntu-24.04
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve and validate tag
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+){2}([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid tag: '$tag' (expected vX.Y.Z)" >&2
            exit 1
          fi

          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  build:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: resolve_ref
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            os: macos-14
            target: aarch64-apple-darwin
          - name: Linux x86_64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
    env:
      ARCHIVE_NAME: pocogit-${{ needs.resolve_ref.outputs.version }}-${{ matrix.target }}
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          ref: ${{ needs.resolve_ref.outputs.release_tag }}

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup target add "${{ matrix.target }}" --toolchain stable

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --locked --target "${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/pocogit" pocogit
          chmod +x pocogit

      - name: Run tests
        shell: bash
        run: cargo test --release --locked --target "${{ matrix.target }}"

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          tar -czf "dist/${ARCHIVE_NAME}.tar.gz" pocogit

      - name: Upload release artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: dist/${{ env.ARCHIVE_NAME }}.tar.gz

  release:
    name: publish release
    runs-on: ubuntu-24.04
    needs: [resolve_ref, build]
    outputs:
      version: ${{ steps.homebrew.outputs.version }}
      archive_url: ${{ steps.homebrew.outputs.archive_url }}
      archive_sha256: ${{ steps.homebrew.outputs.archive_sha256 }}
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          shasum -a 256 *.tar.gz > checksums.txt

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="${{ needs.resolve_ref.outputs.release_tag }}"
          if gh release view "$tag" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release upload "$tag" dist/*.tar.gz dist/checksums.txt --clobber --repo "$GH_REPO"
          else
            gh release create "$tag" dist/*.tar.gz dist/checksums.txt --verify-tag --repo "$GH_REPO"
          fi

      - name: Collect Homebrew tap update values
        id: homebrew
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.resolve_ref.outputs.version }}"
          archive="pocogit-${version}-aarch64-apple-darwin.tar.gz"
          sha256="$(awk -v file="$archive" '$2 == file { print $1 }' dist/checksums.txt)"
          url="https://github.com/${{ github.repository }}/releases/download/v${version}/${archive}"

          if [[ -z "$sha256" ]]; then
            echo "Missing checksum for $archive" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "archive_url=$url" >> "$GITHUB_OUTPUT"
          echo "archive_sha256=$sha256" >> "$GITHUB_OUTPUT"

  update_homebrew_tap:
    name: update Homebrew tap
    runs-on: ubuntu-24.04
    needs: [release]
    permissions:
      contents: read
    env:
      TAP_REPOSITORY: rc-code-jp/homebrew-tap
      FORMULA_PATH: Formula/pocogit.rb
    steps:
      - name: Generate GitHub App installation token
        id: app-token
        shell: bash
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          APP_OWNER: rc-code-jp
          APP_REPOSITORY: homebrew-tap
        run: |
          set -euo pipefail
          : "${APP_ID:?Missing APP_ID}"
          : "${APP_PRIVATE_KEY:?Missing APP_PRIVATE_KEY}"

          app_jwt="$(
            APP_ID="$APP_ID" APP_PRIVATE_KEY="$APP_PRIVATE_KEY" ruby <<'RUBY'
          require "base64"
          require "json"
          require "openssl"

          def base64url(data)
            Base64.urlsafe_encode64(data, padding: false)
          end

          now = Time.now.to_i
          header = { alg: "RS256", typ: "JWT" }
          payload = {
            iat: now - 60,
            exp: now + 540,
            iss: ENV.fetch("APP_ID"),
          }

          private_key = OpenSSL::PKey::RSA.new(ENV.fetch("APP_PRIVATE_KEY"))
          signing_input = [header, payload].map { |part| base64url(JSON.generate(part)) }.join(".")
          signature = private_key.sign(OpenSSL::Digest::SHA256.new, signing_input)
          puts [signing_input, base64url(signature)].join(".")
          RUBY
          )"

          installation_response="$(
            curl --fail-with-body --silent --show-error \
              --request GET \
              --url "https://api.github.com/repos/${APP_OWNER}/${APP_REPOSITORY}/installation" \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${app_jwt}" \
              --header "X-GitHub-Api-Version: 2022-11-28"
          )"

          installation_id="$(
            INSTALLATION_RESPONSE="$installation_response" ruby <<'RUBY'
          require "json"
          puts JSON.parse(ENV.fetch("INSTALLATION_RESPONSE")).fetch("id")
          RUBY
          )"

          token_response="$(
            curl --fail-with-body --silent --show-error \
              --request POST \
              --url "https://api.github.com/app/installations/${installation_id}/access_tokens" \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${app_jwt}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              --header "Content-Type: application/json" \
              --data '{"repositories":["homebrew-tap"]}'
          )"

          token="$(
            TOKEN_RESPONSE="$token_response" ruby <<'RUBY'
          require "json"
          puts JSON.parse(ENV.fetch("TOKEN_RESPONSE")).fetch("token")
          RUBY
          )"

          echo "::add-mask::${token}"
          echo "token=${token}" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          repository: ${{ env.TAP_REPOSITORY }}
          token: ${{ steps.app-token.outputs.token }}
          path: homebrew-tap

      - name: Create or update formula
        shell: bash
        env:
          VERSION: ${{ needs.release.outputs.version }}
          ARCHIVE_URL: ${{ needs.release.outputs.archive_url }}
          ARCHIVE_SHA256: ${{ needs.release.outputs.archive_sha256 }}
        run: |
          set -euo pipefail
          formula="homebrew-tap/${FORMULA_PATH}"

          if [[ -f "$formula" ]]; then
            ruby -e '
              path, version, sha256 = ARGV
              text = File.read(path)
              text.sub!(/^(\s*version\s+").*(")$/,"\\1#{version}\\2") or abort("version line not found")
              text.sub!(/^(\s*sha256\s+").*(")$/,"\\1#{sha256}\\2") or abort("sha256 line not found")
              File.write(path, text)
            ' "$formula" "$VERSION" "$ARCHIVE_SHA256"
          else
            cat > "$formula" <<RUBY
          class Pocogit < Formula
            version "${VERSION}"
            sha256 "${ARCHIVE_SHA256}"

            desc "A compact git TUI for narrow terminal panes"
            homepage "https://github.com/rc-code-jp/pocogit"

            url "https://github.com/rc-code-jp/pocogit/releases/download/v#{version}/pocogit-#{version}-aarch64-apple-darwin.tar.gz"

            def install
              bin.install "pocogit"
            end

            test do
              system "#{bin}/pocogit", "--help"
            end
          end
          RUBY
          fi

      - name: Commit and push formula update
        shell: bash
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail
          cd homebrew-tap
          git config user.name "pocogit release bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${FORMULA_PATH}"

          if git diff --cached --quiet; then
            echo "No tap changes to commit"
            exit 0
          fi

          git commit -m "pocogit ${VERSION}"
          git push origin HEAD:main
